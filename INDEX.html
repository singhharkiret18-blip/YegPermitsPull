<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edmonton Permit Lead Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #ff6b00;
    --accent2: #ffaa00;
    --text: #e8e8e8;
    --text-dim: #666;
    --text-mid: #999;
    --green: #00c853;
    --red: #ff3d3d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .logo span { color: var(--text-dim); font-size: 13px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 1px; display: block; margin-top: -4px; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
    margin-left: auto;
  }
  .status-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .container { max-width: 1200px; margin: 0 auto; padding: 32px; }

  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    align-items: end;
  }

  .control-group label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  select, input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    border-radius: 3px;
    appearance: none;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus, input:focus { border-color: var(--accent); }

  .btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 11px 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1.5px;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.2s, transform 0.1s;
    width: 100%;
  }
  .btn:hover { background: var(--accent2); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { background: #333; color: #666; cursor: not-allowed; }

  .btn-secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 8px 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: var(--accent); color: #000; }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 20px;
    border-left: 3px solid var(--accent);
  }

  .stat-card .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--accent);
    line-height: 1;
  }

  .stat-card .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .table-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--text);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 10px 14px;
    text-align: left;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid #1a1a1a;
    transition: background 0.15s;
    cursor: pointer;
  }

  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 12px 14px;
    vertical-align: top;
    color: var(--text);
  }

  .address-cell {
    font-weight: 500;
    color: var(--text);
    max-width: 200px;
  }

  .desc-cell {
    color: var(--text-mid);
    max-width: 280px;
    font-size: 12px;
    line-height: 1.5;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .badge-new { background: rgba(0,200,83,0.15); color: var(--green); border: 1px solid rgba(0,200,83,0.3); }
  .badge-reno { background: rgba(255,107,0,0.15); color: var(--accent); border: 1px solid rgba(255,107,0,0.3); }
  .badge-multi { background: rgba(100,100,255,0.15); color: #8888ff; border: 1px solid rgba(100,100,255,0.3); }
  .badge-suite { background: rgba(255,170,0,0.15); color: var(--accent2); border: 1px solid rgba(255,170,0,0.3); }

  .value-cell {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--green);
    white-space: nowrap;
  }

  .date-cell {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .action-cell { white-space: nowrap; }

  .search-link {
    display: inline-block;
    padding: 4px 10px;
    background: rgba(255,107,0,0.1);
    border: 1px solid rgba(255,107,0,0.3);
    color: var(--accent);
    text-decoration: none;
    border-radius: 2px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    transition: all 0.2s;
    margin-right: 4px;
  }
  .search-link:hover { background: var(--accent); color: #000; }

  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-dim);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

  .loading {
    padding: 60px 20px;
    text-align: center;
  }

  .loading-bar {
    width: 200px;
    height: 2px;
    background: var(--border);
    margin: 16px auto 0;
    border-radius: 1px;
    overflow: hidden;
  }

  .loading-bar::after {
    content: '';
    display: block;
    height: 100%;
    width: 40%;
    background: var(--accent);
    animation: slide 1s infinite;
    border-radius: 1px;
  }

  @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

  .loading p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .error-msg {
    background: rgba(255,61,61,0.1);
    border: 1px solid rgba(255,61,61,0.3);
    color: var(--red);
    padding: 12px 16px;
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    margin-bottom: 16px;
  }

  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px;
    border-top: 1px solid var(--border);
  }

  .page-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-mid);
    padding: 6px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .page-btn:hover, .page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .neighbourhood-cell {
    font-size: 12px;
    color: var(--text-mid);
    max-width: 130px;
  }

  .export-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* API key setup */
  .api-setup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    border-radius: 4px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .api-setup label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .api-setup input {
    flex: 1;
    min-width: 200px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    border-radius: 3px;
  }
  .api-note {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    width: 100%;
  }

  /* Research panel */
  .research-row td {
    padding: 0 !important;
    background: #0d0d0d;
  }
  .research-panel {
    padding: 20px 24px;
    border-top: 1px solid var(--border);
    border-bottom: 2px solid var(--accent);
  }
  .research-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 16px;
  }
  .research-section-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
    border-bottom: 1px solid #222;
    padding-bottom: 6px;
  }
  .link-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .deep-link {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 2px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-decoration: none;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .deep-link-google { background: rgba(66,133,244,0.12); color: #4285f4; border: 1px solid rgba(66,133,244,0.25); }
  .deep-link-google:hover { background: #4285f4; color: #fff; }
  .deep-link-fb { background: rgba(24,119,242,0.12); color: #1877f2; border: 1px solid rgba(24,119,242,0.25); }
  .deep-link-fb:hover { background: #1877f2; color: #fff; }
  .deep-link-linkedin { background: rgba(0,119,181,0.12); color: #0077b5; border: 1px solid rgba(0,119,181,0.25); }
  .deep-link-linkedin:hover { background: #0077b5; color: #fff; }
  .deep-link-bbb { background: rgba(0,100,200,0.12); color: #0064c8; border: 1px solid rgba(0,100,200,0.25); }
  .deep-link-bbb:hover { background: #0064c8; color: #fff; }
  .deep-link-yellow { background: rgba(255,200,0,0.12); color: #ffc800; border: 1px solid rgba(255,200,0,0.25); }
  .deep-link-yellow:hover { background: #ffc800; color: #000; }
  .deep-link-kijiji { background: rgba(88,183,71,0.12); color: #58b747; border: 1px solid rgba(88,183,71,0.25); }
  .deep-link-kijiji:hover { background: #58b747; color: #fff; }
  .deep-link-houzz { background: rgba(126,211,33,0.12); color: #7ed321; border: 1px solid rgba(126,211,33,0.25); }
  .deep-link-houzz:hover { background: #7ed321; color: #000; }
  .deep-link-maps { background: rgba(234,67,53,0.12); color: #ea4335; border: 1px solid rgba(234,67,53,0.25); }
  .deep-link-maps:hover { background: #ea4335; color: #fff; }

  .ai-research-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 14px;
    min-height: 80px;
    position: relative;
  }
  .ai-research-box.loading-ai {
    border-color: var(--accent);
  }
  .ai-result {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-mid);
  }
  .ai-result strong { color: var(--text); }
  .ai-result .found-tag {
    display: inline-block;
    background: rgba(0,200,83,0.15);
    color: var(--green);
    border: 1px solid rgba(0,200,83,0.3);
    padding: 1px 6px;
    border-radius: 2px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    margin-right: 4px;
  }
  .ai-placeholder {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    padding: 16px 0;
  }
  .btn-research {
    background: rgba(255,107,0,0.15);
    color: var(--accent);
    border: 1px solid rgba(255,107,0,0.4);
    padding: 5px 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    margin-left: 8px;
  }
  .btn-research:hover { background: var(--accent); color: #000; }
  .btn-research:disabled { opacity: 0.4; cursor: not-allowed; }

  .expand-btn {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    transition: transform 0.2s;
    line-height: 1;
  }
  .expand-btn.open { transform: rotate(90deg); }

  .permit-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .no-api-note {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
  }

  @media (max-width: 768px) {
    .container { padding: 16px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .controls { grid-template-columns: 1fr; }
    table { font-size: 12px; }
    th, td { padding: 8px 10px; }
    .research-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    PERMIT LEADS
    <span>EDMONTON NEW CONSTRUCTION</span>
  </div>
  <div class="status-label">LIVE DATA</div>
  <div class="status-dot"></div>
</header>

<div class="container">

  <div class="controls">
    <div class="control-group">
      <label>Category Filter</label>
      <select id="categoryFilter">
        <option value="NEW_CONSTRUCTION">New Construction Only</option>
        <option value="ALL_RESIDENTIAL">All Residential</option>
        <option value="SINGLE">Single Detached Houses</option>
        <option value="MULTI">Multi-Unit (Fourplex etc)</option>
        <option value="SUITE">Basement Suites</option>
      </select>
    </div>
    <div class="control-group">
      <label>Min Construction Value</label>
      <select id="minValue">
        <option value="0">Any Value</option>
        <option value="100000">$100,000+</option>
        <option value="200000" selected>$200,000+</option>
        <option value="300000">$300,000+</option>
        <option value="500000">$500,000+</option>
      </select>
    </div>
    <div class="control-group">
      <label>Days Back</label>
      <select id="daysBack">
        <option value="7">Last 7 days</option>
        <option value="14" selected>Last 14 days</option>
        <option value="30">Last 30 days</option>
        <option value="60">Last 60 days</option>
      </select>
    </div>
    <div class="control-group">
      <label>Neighbourhood Search</label>
      <input type="text" id="neighbourhoodSearch" placeholder="e.g. Windermere, Glenridding...">
    </div>
    <div class="control-group">
      <label>&nbsp;</label>
      <button class="btn" id="fetchBtn" onclick="fetchLeads()">PULL LEADS</button>
    </div>
  </div>

  <div id="statsBar" class="stats-bar" style="display:none">
    <div class="stat-card">
      <div class="num" id="statTotal">0</div>
      <div class="label">Total Permits</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statNew">0</div>
      <div class="label">New Builds</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statValue">$0</div>
      <div class="label">Avg Project Value</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statNeighbourhoods">0</div>
      <div class="label">Neighbourhoods</div>
    </div>
  </div>

  <div id="errorMsg" class="error-msg" style="display:none"></div>

  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">PERMIT LEADS</div>
      <div class="export-row">
        <button class="btn-secondary" id="exportBtn" onclick="exportCSV()" style="display:none">EXPORT CSV</button>
        <button class="btn-secondary" id="copyBtn" onclick="copyAddresses()" style="display:none">COPY ADDRESSES</button>
      </div>
    </div>

    <div id="tableContent">
      <div class="empty-state">
        <div class="icon">🏗️</div>
        <p>SET YOUR FILTERS AND HIT PULL LEADS</p>
        <p style="margin-top:8px;color:#444">PULLS LIVE DATA FROM EDMONTON OPEN DATA</p>
      </div>
    </div>

    <div id="pagination" class="pagination" style="display:none"></div>
  </div>

</div>

<script>
let allLeads = [];
let currentPage = 1;
const perPage = 25;
let expandedRows = new Set();
let researchCache = {};

function saveApiKey() {
  const key = document.getElementById('claudeApiKey').value.trim();
  if (key) {
    localStorage.setItem('claude_api_key', key);
    const btn = event.target;
    btn.textContent = 'SAVED ✓';
    setTimeout(() => btn.textContent = 'SAVE KEY', 2000);
  }
}

function getApiKey() {
  return localStorage.getItem('claude_api_key') || document.getElementById('claudeApiKey').value.trim();
}

// On load, restore saved key
window.addEventListener('load', () => {
  const saved = localStorage.getItem('claude_api_key');
  if (saved) document.getElementById('claudeApiKey').value = saved;
});

function getDateRange() {
  const days = parseInt(document.getElementById('daysBack').value);
  const now = new Date();
  const past = new Date(now - days * 86400000);
  return past.toISOString().split('T')[0] + 'T00:00:00.000';
}

function buildQuery() {
  const category = document.getElementById('categoryFilter').value;
  const minVal = parseInt(document.getElementById('minValue').value);
  const dateFrom = getDateRange();
  const neighbourhood = document.getElementById('neighbourhoodSearch').value.trim().toUpperCase();

  let whereClause = `issue_date >= '${dateFrom}'`;
  if (minVal > 0) whereClause += ` AND construction_value >= ${minVal}`;

  if (category === 'NEW_CONSTRUCTION') {
    whereClause += ` AND (upper(job_description) LIKE '%NEW SINGLE%' OR upper(job_description) LIKE '%NEW DUPLEX%' OR upper(job_description) LIKE '%NEW ROW%' OR upper(job_description) LIKE '%NEW SEMI%' OR upper(job_description) LIKE '%NEW FOURPLEX%' OR upper(job_description) LIKE '%NEW TRIPLEX%' OR upper(job_description) LIKE '%CONSTRUCT%HOUSE%' OR upper(job_description) LIKE '%CONSTRUCT%DWELLING%')`;
  } else if (category === 'ALL_RESIDENTIAL') {
    whereClause += ` AND (upper(job_category) LIKE '%RESIDENTIAL%' OR upper(building_type) LIKE '%RESIDENTIAL%' OR upper(building_type) LIKE '%SINGLE DETACHED%' OR upper(building_type) LIKE '%DUPLEX%')`;
  } else if (category === 'SINGLE') {
    whereClause += ` AND (upper(building_type) LIKE '%SINGLE DETACHED%' OR upper(job_description) LIKE '%SINGLE DETACHED%')`;
  } else if (category === 'MULTI') {
    whereClause += ` AND (upper(building_type) LIKE '%FOURPLEX%' OR upper(building_type) LIKE '%TRIPLEX%' OR upper(building_type) LIKE '%ROW HOUSE%' OR upper(building_type) LIKE '%SEMI-DETACHED%' OR upper(job_description) LIKE '%FOURPLEX%' OR upper(job_description) LIKE '%TRIPLEX%')`;
  } else if (category === 'SUITE') {
    whereClause += ` AND (upper(job_description) LIKE '%BASEMENT%SUITE%' OR upper(job_description) LIKE '%SECONDARY SUITE%' OR upper(job_description) LIKE '%IN-LAW%')`;
  }

  if (neighbourhood) whereClause += ` AND upper(neighbourhood) LIKE '%${neighbourhood}%'`;

  const query = encodeURIComponent(`SELECT * WHERE ${whereClause} ORDER BY issue_date DESC LIMIT 500`);
  return `https://data.edmonton.ca/resource/24uj-dj8v.json?$query=${query}`;
}

async function fetchLeads() {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = 'LOADING...';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('statsBar').style.display = 'none';
  document.getElementById('exportBtn').style.display = 'none';
  document.getElementById('copyBtn').style.display = 'none';
  document.getElementById('pagination').style.display = 'none';
  expandedRows.clear();
  researchCache = {};

  document.getElementById('tableContent').innerHTML = `
    <div class="loading">
      <p>FETCHING EDMONTON PERMIT DATA...</p>
      <div class="loading-bar"></div>
    </div>`;

  try {
    const url = buildQuery();
    const response = await fetch(url);
    if (!response.ok) throw new Error(`API error: ${response.status}`);
    const data = await response.json();

    if (!data || data.length === 0) {
      document.getElementById('tableContent').innerHTML = `
        <div class="empty-state">
          <div class="icon">🔍</div>
          <p>NO PERMITS FOUND FOR THIS FILTER</p>
          <p style="margin-top:8px;color:#444">TRY WIDER DATE RANGE OR DIFFERENT CATEGORY</p>
        </div>`;
    } else {
      allLeads = data;
      currentPage = 1;
      updateStats(data);
      renderTable();
      document.getElementById('exportBtn').style.display = 'inline-block';
      document.getElementById('copyBtn').style.display = 'inline-block';
    }
  } catch (err) {
    document.getElementById('errorMsg').textContent = `ERROR: ${err.message}. The Edmonton Open Data API may be temporarily unavailable.`;
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('tableContent').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>FAILED TO LOAD DATA</p></div>`;
  }

  btn.disabled = false;
  btn.textContent = 'PULL LEADS';
}

function updateStats(data) {
  document.getElementById('statsBar').style.display = 'grid';
  const newBuilds = data.filter(p => {
    const desc = (p.job_description || '').toUpperCase();
    return desc.includes('NEW SINGLE') || desc.includes('NEW DUPLEX') || desc.includes('CONSTRUCT') || desc.includes('NEW ROW') || desc.includes('NEW FOURPLEX');
  }).length;
  const values = data.map(p => parseFloat(p.construction_value) || 0).filter(v => v > 0);
  const avgValue = values.length > 0 ? values.reduce((a, b) => a + b, 0) / values.length : 0;
  const neighbourhoods = new Set(data.map(p => p.neighbourhood).filter(Boolean)).size;
  document.getElementById('statTotal').textContent = data.length;
  document.getElementById('statNew').textContent = newBuilds;
  document.getElementById('statValue').textContent = avgValue > 0 ? '$' + Math.round(avgValue / 1000) + 'K' : 'N/A';
  document.getElementById('statNeighbourhoods').textContent = neighbourhoods;
}

function getBadge(permit) {
  const desc = (permit.job_description || '').toUpperCase();
  const type = (permit.building_type || '').toUpperCase();
  if (desc.includes('BASEMENT SUITE') || desc.includes('SECONDARY SUITE')) return '<span class="badge badge-suite">SUITE</span>';
  if (type.includes('FOURPLEX') || type.includes('TRIPLEX') || type.includes('ROW') || desc.includes('FOURPLEX')) return '<span class="badge badge-multi">MULTI-UNIT</span>';
  if (desc.includes('NEW ') || desc.includes('CONSTRUCT')) return '<span class="badge badge-new">NEW BUILD</span>';
  return '<span class="badge badge-reno">RENO/ALT</span>';
}

function formatValue(val) {
  const n = parseFloat(val);
  if (!n) return '<span style="color:#444">—</span>';
  if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return '$' + Math.round(n/1000) + 'K';
  return '$' + n;
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
}

function getDeepLinks(permit) {
  const addr = (permit.address || '') + ' Edmonton Alberta';
  const addrEnc = encodeURIComponent(addr);
  const addrShort = encodeURIComponent((permit.address || '') + ' Edmonton');

  return {
    googleBuilder: `https://www.google.com/search?q=${addrEnc}+builder+contractor+home`,
    googleGeneral: `https://www.google.com/search?q=${encodeURIComponent('"' + (permit.address||'') + '" Edmonton builder')}`,
    googlePhone: `https://www.google.com/search?q=${addrEnc}+contractor+phone+contact`,
    fb: `https://www.facebook.com/search/top?q=${addrShort}+builder`,
    fbGroups: `https://www.facebook.com/groups/search/?q=Edmonton+home+builders`,
    linkedin: `https://www.linkedin.com/search/results/all/?keywords=${addrEnc}+builder+Edmonton`,
    bbb: `https://www.bbb.org/search?find_text=home+builder&find_loc=Edmonton%2C+AB`,
    yellowpages: `https://www.yellowpages.ca/search/si/1/home+builders/Edmonton+AB`,
    kijiji: `https://www.kijiji.ca/b-contractors-trades/edmonton/home+builder/k0c791l1700203`,
    maps: `https://www.google.com/maps/search/${addrEnc}`,
    houzz: `https://www.houzz.com/professionals/search?location=Edmonton%2C+AB`,
    honestdoor: `https://www.honestdoor.com/permits/ab/edmonton?address=${encodeURIComponent(permit.address||'')}`,
  };
}

function buildResearchPanel(permit, idx) {
  const links = getDeepLinks(permit);
  const apiKey = getApiKey();
  const cacheKey = permit.permit_number || idx;
  const cached = researchCache[cacheKey];

  const aiSection = `
    <div>
      <div class="research-section-title">🤖 AI BUILDER RESEARCH</div>
      <div class="ai-research-box" id="ai-box-${idx}">
        ${cached ? `<div class="ai-result">${cached}</div>` : `
          <div class="ai-placeholder">Click RESEARCH to open Claude.ai in a new tab with this permit pre-loaded. Claude will identify the builder type, suggest search terms, and give you an outreach pitch.</div>
        `}
      </div>
      <button class="btn-research" id="ai-btn-${idx}" onclick="runAiResearch(${idx})">
        ${cached ? 'REOPEN ↗' : '⚡ RESEARCH IN CLAUDE'}
      </button>
    </div>
  `;

  return `
    <div class="research-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--accent)">${permit.address || ''} — BUILDER RESEARCH</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-dim)">PERMIT #${permit.permit_number || '—'} · ${formatDate(permit.issue_date)}</div>
      </div>

      <div class="research-grid">
        <div>
          <div class="research-section-title">🔍 SEARCH — FIND THE BUILDER</div>
          <div class="link-grid">
            <a href="${links.googleBuilder}" target="_blank" class="deep-link deep-link-google">Google: Builder</a>
            <a href="${links.googleGeneral}" target="_blank" class="deep-link deep-link-google">Google: Address</a>
            <a href="${links.googlePhone}" target="_blank" class="deep-link deep-link-google">Google: Phone/Contact</a>
            <a href="${links.maps}" target="_blank" class="deep-link deep-link-maps">Google Maps</a>
            <a href="${links.honestdoor}" target="_blank" class="deep-link deep-link-houzz">HonestDoor</a>
          </div>

          <div class="research-section-title" style="margin-top:16px">📱 SOCIAL CHANNELS</div>
          <div class="link-grid">
            <a href="${links.fb}" target="_blank" class="deep-link deep-link-fb">Facebook Search</a>
            <a href="${links.fbGroups}" target="_blank" class="deep-link deep-link-fb">FB Builder Groups</a>
            <a href="${links.linkedin}" target="_blank" class="deep-link deep-link-linkedin">LinkedIn</a>
          </div>

          <div class="research-section-title" style="margin-top:16px">📋 DIRECTORIES</div>
          <div class="link-grid">
            <a href="${links.bbb}" target="_blank" class="deep-link deep-link-bbb">BBB Edmonton</a>
            <a href="${links.yellowpages}" target="_blank" class="deep-link deep-link-yellow">Yellow Pages</a>
            <a href="${links.kijiji}" target="_blank" class="deep-link deep-link-kijiji">Kijiji Contractors</a>
            <a href="${links.houzz}" target="_blank" class="deep-link deep-link-houzz">Houzz</a>
          </div>
        </div>

        ${aiSection}
      </div>
    </div>
  `;
}

async function runAiResearch(idx) {
  const permit = allLeads[(currentPage - 1) * perPage + idx];
  if (!permit) return;

  const btn = document.getElementById(`ai-btn-${idx}`);
  const box = document.getElementById(`ai-box-${idx}`);
  if (!btn || !box) return;

  btn.disabled = true;
  btn.textContent = 'RESEARCHING...';
  box.classList.add('loading-ai');
  box.innerHTML = `<div class="ai-placeholder" style="color:var(--accent)">
    <div style="margin-bottom:8px">⚡ Analyzing permit data...</div>
    <div class="loading-bar" style="margin:0"></div>
  </div>`;

  const prompt = `I'm an HVAC contractor in Edmonton Alberta trying to identify the builder behind this new construction permit so I can reach out and offer my mechanical services.

Permit details:
- Address: ${permit.address || 'Unknown'}
- Neighbourhood: ${permit.neighbourhood || 'Unknown'}
- Description: ${permit.job_description || 'Unknown'}
- Building Type: ${permit.building_type || 'Unknown'}
- Construction Value: ${permit.construction_value ? '$' + permit.construction_value : 'Unknown'}
- Permit Date: ${permit.issue_date ? permit.issue_date.split('T')[0] : 'Unknown'}
- Permit Number: ${permit.permit_number || 'Unknown'}

Please give me:
1. What type of builder likely pulled this permit (infill, production, custom, developer) based on project type and value
2. Which builders typically operate in this Edmonton neighbourhood
3. Exact search terms to find this specific builder on Google and Facebook
4. A short pitch I can use when I reach them (I offer fast quotes, clean work, flexible scheduling for new construction)
5. Any signals from the permit that tell me how urgent or valuable this lead is`;

  // Launch Claude.ai with prompt pre-filled
  const claudeUrl = `https://claude.ai/new?q=${encodeURIComponent(prompt)}`;
  window.open(claudeUrl, '_blank');

  box.classList.remove('loading-ai');
  box.innerHTML = `<div class="ai-result">
    <span class="found-tag">LAUNCHED</span> <strong>Claude.ai opened in a new tab</strong> with this permit loaded for analysis.<br><br>
    <span style="color:var(--text-dim);font-size:12px">Claude will identify the builder type, suggest search terms, and give you a pitch. Come back here to work through more leads.</span>
  </div>`;
  btn.disabled = false;
  btn.textContent = 'REOPEN ↗';

  const cacheKey = permit.permit_number || idx;
  researchCache[cacheKey] = box.innerHTML;
}

function toggleRow(idx) {
  const researchRowId = `research-row-${idx}`;
  const btn = document.getElementById(`expand-btn-${idx}`);
  const existing = document.getElementById(researchRowId);

  if (existing) {
    existing.remove();
    expandedRows.delete(idx);
    if (btn) btn.classList.remove('open');
    return;
  }

  expandedRows.add(idx);
  if (btn) btn.classList.add('open');

  const permit = allLeads[(currentPage - 1) * perPage + idx];
  const mainRow = document.getElementById(`permit-row-${idx}`);
  if (!mainRow || !permit) return;

  const newRow = document.createElement('tr');
  newRow.id = researchRowId;
  newRow.className = 'research-row';
  newRow.innerHTML = `<td colspan="8">${buildResearchPanel(permit, idx)}</td>`;
  mainRow.insertAdjacentElement('afterend', newRow);
}

function renderTable() {
  const start = (currentPage - 1) * perPage;
  const pageData = allLeads.slice(start, start + perPage);
  const totalPages = Math.ceil(allLeads.length / perPage);

  let html = `<table>
    <thead>
      <tr>
        <th style="width:30px"></th>
        <th>Type</th>
        <th>Address</th>
        <th>Description</th>
        <th>Neighbourhood</th>
        <th>Value</th>
        <th>Date</th>
        <th>Quick Search</th>
      </tr>
    </thead>
    <tbody>`;

  for (let i = 0; i < pageData.length; i++) {
    const p = pageData[i];
    const addr = encodeURIComponent((p.address || '') + ' Edmonton Alberta');
    html += `
      <tr id="permit-row-${i}" onclick="toggleRow(${i})" style="cursor:pointer">
        <td style="text-align:center">
          <button class="expand-btn ${expandedRows.has(i) ? 'open' : ''}" id="expand-btn-${i}">▶</button>
        </td>
        <td>${getBadge(p)}</td>
        <td class="address-cell">
          ${p.address || '—'}
          <div class="permit-num">#${p.permit_number || '—'}</div>
        </td>
        <td class="desc-cell">${p.job_description || '—'}</td>
        <td class="neighbourhood-cell">${p.neighbourhood || '—'}</td>
        <td class="value-cell">${formatValue(p.construction_value)}</td>
        <td class="date-cell">${formatDate(p.issue_date)}</td>
        <td class="action-cell" onclick="event.stopPropagation()">
          <a href="https://www.google.com/search?q=${addr}+builder" target="_blank" class="search-link">G</a>
          <a href="https://www.facebook.com/search/top?q=${encodeURIComponent((p.address||'')+' Edmonton')}" target="_blank" class="search-link">FB</a>
          <a href="https://www.google.com/maps/search/${addr}" target="_blank" class="search-link">MAP</a>
        </td>
      </tr>`;
  }

  html += '</tbody></table>';
  document.getElementById('tableContent').innerHTML = html;

  if (totalPages > 1) {
    let pagHtml = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← PREV</button>`;
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
        pagHtml += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
      } else if (Math.abs(i - currentPage) === 3) {
        pagHtml += `<span style="color:var(--text-dim);font-family:monospace">...</span>`;
      }
    }
    pagHtml += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>NEXT →</button>`;
    document.getElementById('pagination').innerHTML = pagHtml;
    document.getElementById('pagination').style.display = 'flex';
  } else {
    document.getElementById('pagination').style.display = 'none';
  }
}

function goPage(n) {
  const totalPages = Math.ceil(allLeads.length / perPage);
  if (n < 1 || n > totalPages) return;
  currentPage = n;
  expandedRows.clear();
  renderTable();
  document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth' });
}

function exportCSV() {
  if (!allLeads.length) return;
  const headers = ['Address','Neighbourhood','Description','Building Type','Construction Value','Issue Date','Permit Number'];
  const rows = allLeads.map(p => [
    p.address || '', p.neighbourhood || '',
    (p.job_description || '').replace(/,/g, ';'),
    p.building_type || '', p.construction_value || '',
    p.issue_date ? p.issue_date.split('T')[0] : '',
    p.permit_number || ''
  ]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `edmonton_permits_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

function copyAddresses() {
  if (!allLeads.length) return;
  const addresses = allLeads.map(p => `${p.address}, Edmonton AB`).join('\n');
  navigator.clipboard.writeText(addresses).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'COPIED!';
    setTimeout(() => btn.textContent = 'COPY ADDRESSES', 2000);
  });
}
</script>

</body>
</html>
